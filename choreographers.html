<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choreographers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Text:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Обычная черная стрелка -->
    <a href="index.html" class="back-arrow">←</a>

    <div class="choreographers-page">
        <h1>ХОРЕОГРАФЫ</h1>
        <hr>
        
        <!-- Контейнер с хореографами -->
        <div class="choreographers-container">
            <!-- Первый ряд - 4 хореографа -->
            <div class="choreographers-row">
                <div class="choreographer-circle">
                    <img src="img/jazz-funk choreographer.png" alt="Рокси Блейз">
                    <div class="choreographer-circle-info">
                        <p class="choreographer-name">Рокси Блейз</p>
                        <p class="choreographer-style">Jazz-funk</p>
                    </div>
                </div>
                
                <div class="choreographer-circle">
                    <img src="img/hip-hop choreographer.png" alt="Данте Гроув">
                    <div class="choreographer-circle-info">
                        <p class="choreographer-name">Данте Гроув</p>
                        <p class="choreographer-style">Hip-hop</p>
                    </div>
                </div>
                
                <div class="choreographer-circle">
                    <img src="img/k-pop choreographer.png" alt="Луна Чой">
                    <div class="choreographer-circle-info">
                        <p class="choreographer-name">Луна Чой</p>
                        <p class="choreographer-style">K-pop</p>
                    </div>
                </div>
                
                <div class="choreographer-circle">
                    <img src="img/hip-hop choreographer2.png" alt="Нова Фокс">
                    <div class="choreographer-circle-info">
                        <p class="choreographer-name">Нова Фокс</p>
                        <p class="choreographer-style">Hip-hop</p>
                    </div>
                </div>
            </div>
            
            <!-- Второй ряд - 3 хореографа -->
            <div class="choreographers-row">
                <div class="choreographer-circle">
                    <img src="img/breaking choreographer.png" alt="Хана Ли">
                    <div class="choreographer-circle-info">
                        <p class="choreographer-name">Хана Ли</p>
                        <p class="choreographer-style">Break dance</p>
                    </div>
                </div>
                
                <div class="choreographer-circle">
                    <img src="img/high heels choreographer.png" alt="Глэмор Рейн">
                    <div class="choreographer-circle-info">
                        <p class="choreographer-name">Глэмор Рейн</p>
                        <p class="choreographer-style">High heels</p>
                    </div>
                </div>
                
                <div class="choreographer-circle">
                    <img src="img/contemporary choreographer.png" alt="Элио Фрост">
                    <div class="choreographer-circle-info">
                        <p class="choreographer-name">Элио Фрост</p>
                        <p class="choreographer-style">Contemporary</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-content container">
            <div class="footer-left">
                <div class="footer-top">
                    <h6>SWAGA Dance Co., Ltd.</h6>
                    <div class="social-icons">
                        <img src="img/Facebook.png" alt="Facebook">
                        <img src="img/Instagram Circle.png" alt="Instagram">
                    </div>
                </div>
                <div class="footer-bottom">
                    <p>danceandswag@mail.com</p>
                    <ul class="footer-links">
                        <li>ⓒ 2025 All Rights Reserved.</li>
                        <li>Terms To Use</li>
                        <li>Privacy Policy</li>
                    </ul>
                </div>
            </div>
        </div>
    </footer>
</body>
</html>
